<main class="login-body">
    <form method="POST">
        {% csrf_token %}
        <div class="login-form">
            <h2>Reset Password</h2>

            {{ form.as_p }}

            <div class="form-input pt-30">
                <input type="submit" value="Change Password">
            </div>
        </div>
    </form>
</main>
