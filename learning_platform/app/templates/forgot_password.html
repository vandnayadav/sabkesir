<main class="login-body">
    <form method="POST">
        {% csrf_token %}
        <div class="login-form">
            <h2>Forgot Password</h2>

            <div class="form-input">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="form-input pt-30">
                <input type="submit" value="Send Reset Link">
            </div>

            <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </form>
</main>
